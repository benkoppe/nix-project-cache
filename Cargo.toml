[workspace]
resolver = "3"
members = [
  "crates/cache-api",
  "crates/cache-app",
  "crates/cache-auth",
  "crates/cache-core",
  "crates/cache-db",
  "crates/cache-ingest",
  "crates/cache-read",
  "crates/cache-store",
]

[workspace.dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
anyhow = "1"
thiserror = "2"
uuid = { version = "1", features = ["serde", "v7"] }
base64 = "0.22"
time = { version = "0.3", features = [
  "serde",
  "formatting",
  "parsing",
  "macros",
] }
